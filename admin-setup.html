<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Up Admin | Joyfully Present</title>
<link rel="icon" href="https://joyfullypresent.life/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="booking.css">
</head>
<body>

<main>
  <section class="page-hero">
    <div class="wrap">
      <span class="eyebrow">Admin Setup</span>
      <h1>Create your admin account</h1>
      <p class="lead">This only works once — as soon as an admin account exists, this page will refuse to create another one.</p>
    </div>
  </section>

  <section>
    <div class="wrap narrow">
      <div id="error-box"></div>
      <div id="form-view">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="8">
          <span class="small-note">At least 8 characters.</span>
        </div>
        <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="doSetup()">Create Admin Account</button>
      </div>
      <div id="success-view" style="display:none;">
        <div class="success-box">
          <div class="check">&#10003;</div>
          <h2>Admin account created</h2>
          <a href="admin-login.html" class="btn btn-primary">Go to Login</a>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="app-config.js"></script>
<script>
function showError(msg) {
  document.getElementById("error-box").innerHTML = msg ? `<div class="error-note">${msg}</div>` : "";
}

async function doSetup() {
  showError("");
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  if (!email || password.length < 8) { showError("Please enter an email and an 8+ character password."); return; }

  const res = await fetch(`${API_BASE}/admin/setup`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password }),
  });
  const data = await res.json();
  if (!res.ok) { showError(data.error || "Could not create admin account."); return; }

  document.getElementById("form-view").style.display = "none";
  document.getElementById("success-view").style.display = "block";
}
</script>

</body>
</html>
