<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice | Joyfully Present Life Coaching</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="booking.css">
<style>
  .invoice-paper {
    background: var(--white);
    border-radius: var(--radius-lg);
    box-shadow: 0 24px 60px rgba(34, 49, 47, 0.10);
    padding: 48px 44px;
    max-width: 720px;
    margin: 0 auto;
  }
  .invoice-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }
  .invoice-top h1 {
    font-size: 2.4rem;
    margin: 0;
    letter-spacing: 0.02em;
  }
  .invoice-brand { text-align: right; }
  .invoice-brand img { height: 52px; margin-bottom: 8px; margin-left: auto; }
  .invoice-brand .name { font-family: var(--font-logo); font-size: 1.3rem; color: #26D07C; line-height: 1.1; }
  .invoice-brand .name .tagline { display: block; font-family: var(--font-body); font-size: 0.5em; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-soft); }
  .invoice-meta {
    display: flex;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .invoice-meta .label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px; }
  .invoice-meta .meta-right { text-align: right; }
  .invoice-meta .meta-right div { margin-bottom: 4px; font-size: 0.92rem; }
  .invoice-status-badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-bottom: 28px;
  }
  .invoice-status-badge.is-paid { background: var(--teal-pale); color: var(--teal-deep); }
  .invoice-status-badge.is-due { background: #FBF0DE; color: #A8721E; }
  table.invoice-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
  table.invoice-table th {
    text-align: left;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  table.invoice-table th:not(:first-child), table.invoice-table td:not(:first-child) { text-align: right; }
  table.invoice-table td { padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 0.95rem; }
  .invoice-total-row { display: flex; justify-content: flex-end; gap: 24px; padding-top: 6px; margin-bottom: 36px; }
  .invoice-total-row .label { font-weight: 700; }
  .invoice-total-row .amount { font-family: var(--font-display); font-size: 1.4rem; font-weight: 700; }
  .invoice-section-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 10px; }
</style>
</head>
<body>

<header class="site-header">
  <nav class="nav">
    <a href="index.html" class="brand">
      <img src="https://joyfullypresent.life/logo.png" alt="Joyfully Present Life Coaching">
      <span>Joyfully Present<span class="tagline">Life Coaching</span></span>
    </a>
    <button class="nav-toggle" onclick="document.getElementById('mobile-menu').classList.toggle('open')" aria-label="Menu">&#9776;</button>
    <div class="mobile-menu-panel" id="mobile-menu">
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="faq.html">FAQ</a></li>
    </ul>
    </div>
  </nav>
</header>

<main>
  <section>
    <div class="wrap" id="content" style="padding-top:48px;">
      <p class="small-note" style="text-align:center;">Loading…</p>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="wrap">
    <div class="footer-bottom">
      <span>&copy; 2026 Joyfully Present Life Coaching LLC &middot; 440 N Barranca Ave #9885, Covina, CA 91723</span>
      <span>
        <a href="terms.html">Terms</a> &middot;
        <a href="privacy.html">Privacy</a> &middot;
        <a href="https://status.joyfullypresent.life" target="_blank" rel="noopener">Status</a> &middot;
        hello@joyfullypresent.life
      </span>
    </div>
  </div>
</footer>

<script src="app-config.js"></script>
<script>
const token = new URLSearchParams(location.search).get("token");
const justPaid = new URLSearchParams(location.search).get("paid");
const content = document.getElementById("content");

function fmtDate(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleDateString("en-US", { month: "numeric", day: "numeric", year: "numeric" });
}

async function init() {
  if (!token) { content.innerHTML = `<p style="text-align:center;">Missing invoice link.</p>`; return; }

  const res = await fetch(`${API_BASE}/api/invoice?token=${encodeURIComponent(token)}`);
  const data = await res.json();
  if (!res.ok) { content.innerHTML = `<p style="text-align:center;">${data.error || "Invoice not found."}</p>`; return; }

  const inv = data.invoice;
  const isPaid = inv.status === "paid" || justPaid === "1";
  const invoiceNumber = inv.id.slice(0, 8).toUpperCase();

  const itemsHtml = data.items.map((it) => `
    <tr>
      <td>${it.description}</td>
      <td>${it.quantity}</td>
      <td>${formatMoney(it.unit_price_cents)}</td>
      <td>${formatMoney(it.quantity * it.unit_price_cents)}</td>
    </tr>`).join("");

  content.innerHTML = `
    <div class="invoice-paper">
      <div class="invoice-top">
        <h1>Invoice</h1>
        <div class="invoice-brand">
          <img src="https://joyfullypresent.life/logo.png" alt="Joyfully Present Life Coaching">
          <div class="name">Joyfully Present<span class="tagline">Life Coaching</span></div>
        </div>
      </div>

      <div class="invoice-meta">
        <div>
          <div class="label">Issued To</div>
          <div style="font-weight:600;">${inv.customer_name}</div>
          <div class="small-note">${inv.customer_email}</div>
        </div>
        <div class="meta-right">
          <div><span class="small-note">Invoice No.</span> ${invoiceNumber}</div>
          <div><span class="small-note">Date</span> ${fmtDate(inv.issued_at || inv.created_at)}</div>
          ${inv.due_date ? `<div><span class="small-note">Due Date</span> ${fmtDate(inv.due_date)}</div>` : ""}
        </div>
      </div>

      <span class="invoice-status-badge ${isPaid ? "is-paid" : "is-due"}">${isPaid ? "Paid" : "Payment Due"}</span>

      <table class="invoice-table">
        <thead><tr><th>Description</th><th>Qty</th><th>Rate</th><th>Total</th></tr></thead>
        <tbody>${itemsHtml}</tbody>
      </table>

      <div class="invoice-total-row">
        <span class="label">Total Due</span>
        <span class="amount">${formatMoney(inv.amount_cents)}</span>
      </div>

      <div class="invoice-section-label">Payment</div>
      <div id="pay-options"></div>
    </div>
  `;

  const optionsEl = document.getElementById("pay-options");

  if (isPaid) {
    optionsEl.innerHTML = `<p>This invoice has been paid${inv.payment_provider ? ` via ${inv.payment_provider}` : ""}. Thank you!</p>`;
    return;
  }

  const methods = (inv.allowed_payment_methods || "").split(",").filter(Boolean);
  if (!methods.length) {
    optionsEl.innerHTML = `<p class="small-note">Payment options will be added to this invoice shortly — check back soon, or reach out to hello@joyfullypresent.life.</p>`;
    return;
  }

  if (methods.includes("stripe")) {
    const btn = document.createElement("button");
    btn.className = "btn btn-primary";
    btn.style.width = "100%";
    btn.style.marginBottom = "12px";
    btn.textContent = "Pay with Card";
    btn.addEventListener("click", async () => {
      btn.textContent = "Redirecting…";
      const r = await fetch(`${API_BASE}/api/invoice/${inv.id}/pay/stripe`, {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token }),
      });
      const d = await r.json();
      if (d.url) location.href = d.url; else { btn.textContent = "Pay with Card"; alert(d.error || "Something went wrong."); }
    });
    optionsEl.appendChild(btn);
  }

  if (methods.includes("paypal")) {
    const div = document.createElement("div");
    div.id = "paypal-buttons";
    div.style.marginBottom = "12px";
    optionsEl.appendChild(div);
    const script = document.createElement("script");
    script.src = `https://www.paypal.com/sdk/js?client-id=${PAYPAL_CLIENT_ID}&currency=USD`;
    script.onload = () => {
      paypal.Buttons({
        createOrder: async () => {
          const r = await fetch(`${API_BASE}/api/invoice/${inv.id}/pay/paypal/create-order`, {
            method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token }),
          });
          const d = await r.json();
          return d.order_id;
        },
        onApprove: async (data) => {
          await fetch(`${API_BASE}/api/invoice/${inv.id}/pay/paypal/capture-order`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, order_id: data.orderID }),
          });
          location.href = `invoice.html?token=${token}&paid=1`;
        },
      }).render("#paypal-buttons");
    };
    document.body.appendChild(script);
  }

  if (methods.includes("zelle") && data.settings.zelle_enabled) {
    const box = document.createElement("div");
    box.className = "signed-in-box";
    box.innerHTML = `<strong>Pay with Zelle:</strong> ${data.settings.zelle_instructions || ""}<br><span class="small-note">Once sent, we'll mark this invoice paid on our end.</span>`;
    optionsEl.appendChild(box);
  }

  if (methods.includes("venmo") && data.settings.venmo_enabled) {
    const box = document.createElement("div");
    box.className = "signed-in-box";
    box.innerHTML = `<strong>Pay with Venmo:</strong> ${data.settings.venmo_instructions || ""}<br><span class="small-note">Once sent, we'll mark this invoice paid on our end.</span>`;
    optionsEl.appendChild(box);
  }
}

init();
</script>

</body>
</html>
