<script src="app-config.js"></script>
<script>
let selectedService = null;
let selectedSlot = null;
let currentCustomer = null;

const params = new URLSearchParams(location.search);
const preselectServiceId = params.get("service");

function showError(msg) {
  document.getElementById("error-box").innerHTML = msg ? `<div class="error-note">${msg}</div>` : "";
}

function goToStep(n) {
  for (let i = 1; i <= 4; i++) {
    document.getElementById(`step-${i}`).style.display = i === n ? "block" : "none";
    const dot = document.getElementById(`dot-${i}`);
    dot.classList.toggle("active", i === n);
    dot.classList.toggle("done", i < n);
  }
  showError("");
}

// ---------- Step 1: services ----------
async function loadServices() {
  const res = await fetch(`${API_BASE}/api/services`);
  const data = await res.json();
  const list = document.getElementById("service-list");
  list.innerHTML = "";
  data.services.forEach((s) => {
    const el = document.createElement("div");
    el.className = "option-card";
    const bundleNote = s.is_package ? ` &middot; <strong>${s.package_size}-session bundle</strong>` : "";
    el.innerHTML = `<div class="row"><div><h3>${s.name}</h3><p>${s.description || ""} &middot; ${s.duration_minutes} min${bundleNote}</p></div><div class="price">${formatMoney(s.price_cents)}</div></div>`;
    el.addEventListener("click", () => selectService(s, el));
    list.appendChild(el);
    if (preselectServiceId === s.id) selectService(s, el);
  });
}

function selectService(service, el) {
  selectedService = service;
  document.querySelectorAll("#service-list .option-card").forEach((c) => c.classList.remove("selected"));
  el.classList.add("selected");

  if (service.is_package) {
    selectedSlot = null;
    goToStep(3);
    checkSignedIn();
    return;
  }

  goToStep(2);
  const dateInput = document.getElementById("date-input");
  const today = new Date().toISOString().split("T")[0];
  dateInput.min = today;
  if (!dateInput.value) dateInput.value = today;
  loadSlots();
}

// ---------- Step 2: date + time ----------
document.getElementById("date-input").addEventListener("change", loadSlots);

async function loadSlots() {
  const date = document.getElementById("date-input").value;
  if (!date || !selectedService) return;
  const grid = document.getElementById("slot-grid");
  grid.innerHTML = `<p class="empty-note">Loading times…</p>`;
  const res = await fetch(`${API_BASE}/api/availability?date=${date}&service_id=${selectedService.id}`);
  const data = await res.json();
  grid.innerHTML = "";
  if (!data.slots || !data.slots.length) {
    grid.innerHTML = `<p class="empty-note">No times available that day — try another date.</p>`;
    return;
  }
  data.slots.forEach((slot) => {
    const btn = document.createElement("button");
    btn.className = "slot-btn";
    btn.textContent = slot.label.split(", ").slice(1).join(", ");
    btn.addEventListener("click", () => {
      selectedSlot = slot;
      document.querySelectorAll(".slot-btn").forEach((b) => b.classList.remove("selected"));
      btn.classList.add("selected");
      goToStep(3);
      checkSignedIn();
    });
    grid.appendChild(btn);
  });
}

// ---------- Step 3: details ----------
async function checkSignedIn() {
  const res = await fetch(`${API_BASE}/auth/me`, { credentials: "include" });
  const data = await res.json();
  currentCustomer = data.customer;
  
  const returnPath = "/book.html?service=" + (selectedService ? selectedService.id : "");
  
  document.getElementById("google-signin-btn").href = `${API_BASE}/auth/google/start?return_to=${encodeURIComponent(returnPath)}`;
  
  if (currentCustomer) {
    document.getElementById("signed-in-view").style.display = "block";
    document.getElementById("guest-view").style.display = "none";
    let boxHtml = `Booking as <strong>${currentCustomer.name}</strong> (${currentCustomer.email})`;

    if (!selectedService.is_package) {
      const creditsRes = await fetch(`${API_BASE}/api/my-credits`, { credentials: "include" });
      const creditsData = await creditsRes.json();
      const match = (creditsData.credits || []).find((c) => c.redeemable_service_id === selectedService.id);
      if (match && match.remaining > 0) {
        boxHtml += `<label style="display:flex; align-items:center; gap:8px; margin-top:12px;">
          <input type="checkbox" id="use-credit-checkbox" style="width:auto;" checked>
          Use one of my ${match.remaining} available session credits (no charge)
        </label>`;
      }
    }
    document.getElementById("signed-in-box").innerHTML = boxHtml;
  } else {
    document.getElementById("signed-in-view").style.display = "none";
    document.getElementById("guest-view").style.display = "block";

    const oldBtn = document.getElementById("sso-signin-btn");
    const newBtn = oldBtn.cloneNode(true);
    oldBtn.parentNode.replaceChild(newBtn, oldBtn);

    // ✅ FIXED: Direct browser native routing logic to eliminate fetch CORS errors completely
    newBtn.addEventListener("click", (e) => {
      e.preventDefault();
      const targetUrl = `${API_BASE}/auth/sso/start?return_to=${encodeURIComponent(returnPath)}`;
      window.location.href = targetUrl;
    });
  }
}

async function submitBooking() {
  showError("");
  const body = { service_id: selectedService.id };
  if (selectedSlot) body.start_time = selectedSlot.start_time;

  const creditCheckbox = document.getElementById("use-credit-checkbox");
  if (creditCheckbox && creditCheckbox.checked) body.use_credit = true;

  if (!currentCustomer) {
    const name = document.getElementById("g-name").value.trim();
    const email = document.getElementById("g-email").value.trim();
    const phone = document.getElementById("g-phone").value.trim();
    if (!name || !email) { showError("Please enter your name and email."); return; }
    body.guest = { name, email, phone };
  }

  const res = await fetch(`${API_BASE}/api/book`, {
    method: "POST",
    credentials: "include",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const data = await res.json();

  if (!res.ok) { showError(data.error || "Something went wrong — please try again."); return; }

  if (data.package) {
    document.getElementById("confirm-summary").textContent = `${data.service_name} — ${data.sessions_granted} sessions added to your account`;
  } else {
    document.getElementById("confirm-summary").textContent = data.used_credit
      ? `${data.service_name} — ${data.label} (using a session credit)`
      : `${data.service_name} — ${data.label}`;
  }

  if (data.guest_token) {
    document.getElementById("confirm-token-note").style.display = "block";
    document.getElementById("confirm-token-note").innerHTML =
      `Bookmark this link to view or cancel your appointment: <br><a href="appointment.html?token=${data.guest_token}">${location.origin}/appointment.html?token=${data.guest_token}</a>`;
  } else if (data.invoice_token) {
    document.getElementById("confirm-token-note").style.display = "block";
    document.getElementById("confirm-token-note").innerHTML =
      `A confirmation email with your invoice is on its way. You can also <a href="invoice.html?token=${data.invoice_token}">view or pay it here</a>.`;
  }
  goToStep(4);
}

// Helpers
function formatMoney(cents) {
  return '$' + (cents / 100).toFixed(2);
}

loadServices();

if (preselectServiceId) {
  checkSignedIn();
}
</script>

</body>
</html>
